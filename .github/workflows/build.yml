name: Build Windows EXE

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Fetch xray-core for embedding
        run: |
          New-Item -ItemType Directory -Force client\runtime | Out-Null
          $url = "https://github.com/XTLS/Xray-core/releases/latest/download/Xray-windows-64.zip"
          Invoke-WebRequest -Uri $url -OutFile xray.zip
          Expand-Archive xray.zip -DestinationPath xray-tmp -Force
          Copy-Item xray-tmp\xray.exe client\runtime\xray.exe
          Write-Host "Embedded xray.exe: $((Get-Item client\runtime\xray.exe).Length / 1MB) MB"

      - name: Publish single-file self-contained exe
        run: dotnet publish client/VlessMonitor.csproj -c Release -o publish

      - name: Stage release files
        run: |
          New-Item -ItemType Directory -Force dist\VlessMonitor | Out-Null
          Copy-Item publish\VlessMonitor.exe dist\VlessMonitor\
          Copy-Item client\config.example.json dist\VlessMonitor\
          Copy-Item README_RU.md dist\VlessMonitor\
          Copy-Item README.md dist\VlessMonitor\

      - name: Create ZIP archive
        run: Compress-Archive -Path dist\VlessMonitor\* -DestinationPath VlessMonitor-windows-x64.zip

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: VlessMonitor-windows-x64
          path: VlessMonitor-windows-x64.zip

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: VlessMonitor-windows-x64.zip
          generate_release_notes: true
          body: |
            ## VLESS Monitor ${{ github.ref_name }}

            Нативное Windows-приложение (.NET 8, WinForms). **Не требует установки Python или .NET, ничего не качает при запуске** — xray-core встроен внутрь exe.

            ### Установка
            1. Скачайте `VlessMonitor-windows-x64.zip`
            2. Распакуйте в любую папку
            3. Запустите `VlessMonitor.exe`
            4. Вставьте вашу VLESS-ссылку в окне настроек

            xray-core распакуется из самого exe при первом запуске — доступ к GitHub не нужен. Иконка появится в системном трее.
